<!DOCTYPE html>
<html>
<head>
<title>Birju AI</title>
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}
.chat-box{
background:#1e293b;
height:300px;
overflow:auto;
padding:10px;
margin:20px;
border-radius:10px;
}
input{
padding:10px;
width:60%;
border-radius:8px;
border:none;
}
button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
cursor:pointer;
}
img{
margin-top:15px;
max-width:90%;
border-radius:10px;
}
</style>
</head>
<body>

<h1>Birju AI</h1>

<div class="chat-box" id="chat"></div>

<input type="text" id="userInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>

<hr>

<h2>Image Generator</h2>

<input type="text" id="imgInput" placeholder="Enter image keyword">
<button onclick="generateImage()">Generate</button>

<br>
<img id="resultImage">

<script>
function sendMessage(){
let input=document.getElementById("userInput").value;
let chat=document.getElementById("chat");

chat.innerHTML += "<p><b>You:</b> "+input+"</p>";

let reply="";

if(input.toLowerCase().includes("hello")){
reply="Hello! Main Birju AI hoon 😊";
}
else if(input.toLowerCase().includes("dog")){
reply="Dog ek loyal animal hota hai 🐶";
}
else if(input.toLowerCase().includes("cat")){
reply="Cat bahut cute hoti hai 🐱";
}
else{
reply="Mujhe samajh nahi aaya 😅";
}

chat.innerHTML += "<p><b>AI:</b> "+reply+"</p>";

document.getElementById("userInput").value="";
chat.scrollTop=chat.scrollHeight;
}

function generateImage(){
let keyword=document.getElementById("imgInput").value;
let img=document.getElementById("resultImage");

img.src="https://source.unsplash.com/600x400/?"+keyword;
}
</script>

</body>
</html>
